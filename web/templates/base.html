<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hermes{% block title %}{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f13;
      --surface: #1a1a22;
      --surface2: #22222e;
      --border: #2e2e3e;
      --text: #e8e8f0;
      --muted: #888899;
      --accent: #7c6cff;
      --accent-dim: #3d3570;
      --green: #4ade80;
      --yellow: #fbbf24;
      --red: #f87171;
      --orange: #fb923c;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* Layout */
    .layout { display: flex; min-height: 100vh; }

    .sidebar {
      width: 200px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 24px 0 0;
      flex-shrink: 0;
      position: fixed;
      top: 0; left: 0; bottom: 0;
      display: flex;
      flex-direction: column;
    }

    .sidebar-logo {
      padding: 0 20px 24px;
      font-size: 18px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.5px;
    }

    .sidebar-logo span { color: var(--muted); font-weight: 400; font-size: 11px; display: block; margin-top: 2px; }

    .nav a {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 20px;
      color: var(--muted);
      text-decoration: none;
      font-size: 13px;
      transition: all 0.15s;
      border-left: 2px solid transparent;
    }

    .nav a:hover { color: var(--text); background: var(--surface2); }
    .nav a.active { color: var(--accent); border-left-color: var(--accent); background: var(--accent-dim); }

    .main { margin-left: 200px; flex: 1; padding: 32px; max-width: 960px; }

    /* Components */
    h1 { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
    h2 { font-size: 16px; font-weight: 600; margin-bottom: 16px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .subtitle { color: var(--muted); font-size: 13px; margin-bottom: 28px; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 16px;
    }

    .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
    .card-title { font-weight: 600; font-size: 15px; }
    .card-sub { color: var(--muted); font-size: 12px; margin-top: 2px; }

    .badge {
      display: inline-block; padding: 2px 8px; border-radius: 20px;
      font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .badge-critical { background: rgba(248,113,113,0.15); color: var(--red); }
    .badge-high { background: rgba(251,146,60,0.15); color: var(--orange); }
    .badge-medium { background: rgba(251,191,36,0.15); color: var(--yellow); }
    .badge-low { background: rgba(74,222,128,0.15); color: var(--green); }

    .tag {
      display: inline-block; padding: 2px 7px; border-radius: 4px;
      font-size: 11px; background: var(--surface2); color: var(--muted);
      border: 1px solid var(--border); margin-right: 4px;
    }
    .tag-bonus { background: rgba(124,108,255,0.15); color: var(--accent); border-color: var(--accent-dim); }

    .progress-bar { height: 4px; background: var(--surface2); border-radius: 2px; margin-top: 12px; }
    .progress-fill { height: 100%; border-radius: 2px; background: var(--accent); transition: width 0.3s; }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 20px;
    }
    .stat-value { font-size: 28px; font-weight: 700; }
    .stat-label { color: var(--muted); font-size: 12px; margin-top: 2px; }

    .urgent-banner {
      background: rgba(248,113,113,0.1);
      border: 1px solid rgba(248,113,113,0.3);
      border-radius: 10px;
      padding: 16px 20px;
      margin-bottom: 20px;
      color: var(--red);
    }

    .due-soon { color: var(--red); }
    .due-today { color: var(--orange); font-weight: 600; }
    .due-ok { color: var(--muted); }

    .section { margin-bottom: 36px; }

    /* Table */
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 8px 12px; color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); }
    td { padding: 12px; border-bottom: 1px solid var(--border); font-size: 13px; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--surface2); }

    /* Buttons */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 16px; border-radius: 6px; font-size: 13px; font-weight: 500;
      cursor: pointer; border: none; text-decoration: none; transition: all 0.15s;
    }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: #6b5ce7; }
    .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover { color: var(--text); border-color: var(--accent); }

    /* Difficulty dots */
    .diff-dots { display: inline-flex; gap: 3px; }
    .diff-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border); }
    .diff-dot.filled { background: var(--accent); }
    .diff-dot.high { background: var(--orange); }
    .diff-dot.critical { background: var(--red); }

    /* Alerts */
    .alert { padding: 12px 16px; border-radius: 8px; margin-bottom: 12px; font-size: 13px; }
    .alert-warning { background: rgba(251,191,36,0.1); border: 1px solid rgba(251,191,36,0.3); color: var(--yellow); }
    .alert-danger { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3); color: var(--red); }
    .alert-info { background: rgba(124,108,255,0.1); border: 1px solid rgba(124,108,255,0.3); color: var(--accent); }

    /* Unread badge */
    .nav-badge {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 16px; height: 16px; border-radius: 8px;
      background: var(--red); color: white; font-size: 9px; font-weight: 700;
      margin-left: auto; padding: 0 4px;
    }

    /* Card hover animation */
    .card { transition: border-color 0.15s, transform 0.15s; }
    .card:hover { border-color: var(--accent-dim); }

    /* Mobile nav */
    @media (max-width: 640px) {
      .sidebar {
        width: 100%;
        height: auto;
        position: relative;
        flex-direction: row;
        flex-wrap: wrap;
        padding: 8px 0 0;
        border-right: none;
        border-bottom: 1px solid var(--border);
      }
      .sidebar-logo { padding: 4px 16px 8px; font-size: 15px; }
      .nav { flex-direction: row; flex-wrap: wrap; flex: none; width: 100%; }
      .nav a { padding: 6px 12px; font-size: 12px; border-left: none; border-bottom: 2px solid transparent; }
      .nav a.active { border-bottom-color: var(--accent); border-left-color: transparent; }
      .main { margin-left: 0; padding: 16px; }
      .layout { flex-direction: column; }
    }

    /* Quick stats bar */
    .quick-stats {
      display: flex; gap: 0; border: 1px solid var(--border); border-radius: 10px;
      overflow: hidden; margin-bottom: 20px;
    }
    .quick-stat {
      flex: 1; padding: 12px 16px; text-align: center; border-right: 1px solid var(--border);
    }
    .quick-stat:last-child { border-right: none; }
    .quick-stat-val { font-size: 20px; font-weight: 700; color: var(--text); }
    .quick-stat-label { font-size: 11px; color: var(--muted); margin-top: 2px; }

    /* Proactive warning cards */
    .warning-card {
      display: flex; gap: 12px; align-items: flex-start;
      padding: 14px 18px; border-radius: 10px; margin-bottom: 12px;
      font-size: 13px; font-weight: 500;
    }
    .warning-card.danger { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3); color: var(--red); }
    .warning-card.warning { background: rgba(251,191,36,0.1); border: 1px solid rgba(251,191,36,0.3); color: var(--yellow); }
    .warning-card.info { background: rgba(124,108,255,0.1); border: 1px solid rgba(124,108,255,0.3); color: var(--accent); }
    .warning-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <div class="layout">
    <nav class="sidebar">
      <div class="sidebar-logo">
        Hermes
        <span>OSU School Buddy</span>
      </div>
      <div class="nav" style="flex:1;">
        <a href="/" class="{% if request.path == '/' %}active{% endif %}">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          Dashboard
        </a>
        <a href="/calendar" class="{% if request.path == '/calendar' %}active{% endif %}">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          Calendar
        </a>
        <a href="/assignments" class="{% if request.path == '/assignments' %}active{% endif %}">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          Assignments
        </a>
        <a href="/exams" class="{% if request.path == '/exams' %}active{% endif %}">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          Exams
        </a>
        <a href="/grades" class="{% if request.path == '/grades' %}active{% endif %}">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
          Grades
        </a>
        <a href="/study-plan" class="{% if request.path == '/study-plan' %}active{% endif %}">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          Study Plan
        </a>
        <a href="/alerts" class="{% if request.path == '/alerts' %}active{% endif %}">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          Alerts
        </a>
        <a href="/chat" class="{% if request.path == '/chat' %}active{% endif %}">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          Chat
        </a>
        <a href="/courses" class="{% if request.path == '/courses' %}active{% endif %}">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
          Courses
        </a>
        <a href="/roi" class="{% if request.path == '/roi' %}active{% endif %}">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
          ROI Radar
        </a>
        <a href="/settings" class="{% if request.path == '/settings' %}active{% endif %}">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          Settings
        </a>
      </div>
    </nav>
    <main class="main">
      {% block content %}{% endblock %}
    </main>
  </div>
</body>
</html>
